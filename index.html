<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Is</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="intro">
  <div class="overlay"></div>
  <div class="intro-content">
    <h1 class="title">Love Is...</h1>
    <p class="subtitle">история о Артеме и Юли 💌</p>
    <button id="enterBtn">войти ❤️</button>
  </div>
</div>

<div class="container" id="main">
  <div class="names">Артём + Юля ❤️</div>
  <div class="slider" id="slider">
    <div class="card active">
      <img src="images/1.jpg">
      <div class="polaroid-text">Любить — это смотреть на неё</div>
    </div>
    <div class="card next">
      <img src="images/2.jpg">
      <div class="polaroid-text">Любить — это держать её</div>
    </div>
    <div class="card prev">
      <img src="images/3.jpg">
      <div class="polaroid-text">Любить — это быть рядом</div>
    </div>
    <div class="card">
      <img src="images/4.jpg">
      <div class="polaroid-text">Любить — это она</div>
    </div>
  </div>
</div>

<audio id="music" src="music.mp3" loop></audio>
<canvas id="hearts"></canvas>

<script src="script.js"></script>
</body>
</html>
